[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rotation-stage-controller"
version = "0.1.0"
description = "Minimal serial controller for a single-axis rotation stage."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "pyserial>=3.5",
]

[project.scripts]
rotation-stage = "rotation_stage_controller.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
